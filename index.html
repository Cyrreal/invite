<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Приглашение на праздник</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="invitation-card">
    <div class="photo-block">
      <img src="./images/wedding.jpg" alt="photo" />
    </div>

    <div class="invitation-text">
      <div class="event-name">20 лет<br /> <span class="lined">в жести </span><br /><span class="red">в месте</span>
      </div>

      <div class="main-message">
        Дорогие друзья!<br>
        Будет душевно, вкусно и громко.<br>
        Жду вас разделить этот вечер!
      </div>

      <div class="details">
        <p><span class="emoji">📅</span> 11 июля 2026, суббота</p>
        <p><span class="emoji">⏰</span> 14:00 – до посинения</p>
        <p><span class="emoji">📍</span> Сумбулово, ул. Центральная 74</p>
        <p><span class="emoji">🎁</span> Главный подарок — ваше настроение</p>
      </div>

    </div>
    <div class="photo-block bottom-img">
      <img src="./images/nature.jpg" alt="photo-2" />
    </div>
  </div>
</body>

</html>
